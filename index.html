<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Krav Maga — Asistencia</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --negro: #0a0a0a;
    --rojo: #e63329;
    --rojo-oscuro: #b5251c;
    --blanco: #f5f5f0;
    --gris: #1e1e1e;
    --gris-claro: #2e2e2e;
    --texto-suave: #888;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--negro);
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
  }

  #login-screen {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 4rem;
    letter-spacing: 4px;
    color: var(--blanco);
    margin-bottom: 0.2rem;
  }

  .logo span { color: var(--rojo); }

  .tagline {
    color: var(--texto-suave);
    font-size: 0.8rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 3rem;
  }

  .login-box {
    width: 100%;
    max-width: 380px;
    background: var(--gris);
    border-radius: 12px;
    padding: 2rem;
    border: 1px solid #333;
  }

  .login-box h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.4rem;
    letter-spacing: 2px;
    margin-bottom: 1.5rem;
    color: var(--texto-suave);
  }

  input {
    width: 100%;
    background: var(--negro);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 0.9rem 1rem;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    outline: none;
    transition: border-color 0.2s;
  }

  input:focus { border-color: var(--rojo); }

  .btn {
    width: 100%;
    background: var(--rojo);
    color: var(--blanco);
    border: none;
    border-radius: 8px;
    padding: 0.9rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.1rem;
    letter-spacing: 2px;
    cursor: pointer;
    transition: background 0.2s;
  }

  .btn:hover { background: var(--rojo-oscuro); }
  .btn:disabled { background: #444; cursor: not-allowed; }

  .btn-outline {
    background: transparent;
    border: 1px solid var(--rojo);
    color: var(--rojo);
    margin-top: 0.5rem;
  }

  .btn-outline:hover { background: var(--rojo); color: var(--blanco); }

  .error-msg {
    color: var(--rojo);
    font-size: 0.8rem;
    margin-top: 0.5rem;
    display: none;
  }

  #app { display: none; min-height: 100vh; }

  header {
    background: var(--gris);
    border-bottom: 1px solid #333;
    padding: 1rem 1.5rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  header .logo { font-size: 1.8rem; margin: 0; }

  .user-info { display: flex; align-items: center; gap: 0.8rem; }
  .user-name { font-size: 0.85rem; color: var(--texto-suave); }

  .logout-btn {
    background: none;
    border: 1px solid #444;
    color: var(--texto-suave);
    border-radius: 6px;
    padding: 0.3rem 0.7rem;
    font-size: 0.75rem;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.2s;
  }

  .logout-btn:hover { border-color: var(--rojo); color: var(--rojo); }

  main { padding: 1.5rem; max-width: 600px; margin: 0 auto; }

  .tabs {
    display: flex;
    gap: 0.5rem;
    margin-bottom: 1.5rem;
    background: var(--gris);
    border-radius: 10px;
    padding: 0.3rem;
  }

  .tab {
    flex: 1;
    background: none;
    border: none;
    color: var(--texto-suave);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1rem;
    letter-spacing: 1px;
    padding: 0.6rem;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab.active { background: var(--rojo); color: var(--blanco); }

  .card {
    background: var(--gris);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1rem;
    border: 1px solid #333;
  }

  .card-label {
    font-size: 0.7rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--texto-suave);
    margin-bottom: 0.3rem;
  }

  .card-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 2.5rem;
    line-height: 1;
    color: var(--blanco);
  }

  .card-value.rojo { color: var(--rojo); }

  .progress-wrap {
    background: var(--negro);
    border-radius: 100px;
    height: 8px;
    margin-top: 1rem;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--rojo);
    border-radius: 100px;
    transition: width 0.8s ease;
  }

  .progress-label {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--texto-suave);
    margin-top: 0.4rem;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.8rem;
    margin-bottom: 1rem;
  }

  .stat-card {
    background: var(--gris);
    border-radius: 10px;
    padding: 1rem;
    border: 1px solid #333;
    text-align: center;
  }

  .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 2rem; color: var(--blanco); }
  .stat-label { font-size: 0.7rem; color: var(--texto-suave); letter-spacing: 1px; text-transform: uppercase; }

  .clase-item {
    background: var(--gris);
    border-radius: 10px;
    padding: 1rem 1.2rem;
    margin-bottom: 0.8rem;
    border: 1px solid #333;
    display: flex;
    align-items: center;
    justify-content: space-between;
    transition: border-color 0.2s;
  }

  .clase-item:hover { border-color: #555; }
  .clase-info h3 { font-size: 0.95rem; font-weight: 500; margin-bottom: 0.2rem; }
  .clase-info p { font-size: 0.75rem; color: var(--texto-suave); }

  .btn-small {
    background: var(--rojo);
    color: var(--blanco);
    border: none;
    border-radius: 6px;
    padding: 0.5rem 1rem;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 0.85rem;
    letter-spacing: 1px;
    cursor: pointer;
    transition: background 0.2s;
    white-space: nowrap;
  }

  .btn-small:hover { background: var(--rojo-oscuro); }
  .btn-small.inscrito { background: #2d5a27; color: #7bc67a; cursor: default; }

  .alumno-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0.8rem 1rem;
    border-bottom: 1px solid #2a2a2a;
  }

  .alumno-row:last-child { border-bottom: none; }
  .alumno-nombre { font-size: 0.95rem; }

  .check-btn {
    width: 36px;
    height: 36px;
    border-radius: 50%;
    border: 2px solid #444;
    background: none;
    color: var(--texto-suave);
    font-size: 1rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .check-btn.presente { background: #2d5a27; border-color: #7bc67a; color: #7bc67a; }
  .check-btn.ausente { background: #5a2727; border-color: #c67a7a; color: #c67a7a; }

  .section-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.2rem;
    letter-spacing: 2px;
    color: var(--texto-suave);
    margin-bottom: 1rem;
    text-transform: uppercase;
  }

  select {
    width: 100%;
    background: var(--negro);
    border: 1px solid #333;
    border-radius: 8px;
    padding: 0.9rem 1rem;
    color: var(--blanco);
    font-family: 'DM Sans', sans-serif;
    font-size: 0.95rem;
    margin-bottom: 1rem;
    outline: none;
    cursor: pointer;
  }

  select:focus { border-color: var(--rojo); }

  .loading {
    text-align: center;
    color: var(--texto-suave);
    padding: 2rem;
    font-size: 0.85rem;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .hidden { display: none !important; }

  .alert {
    background: #1a3a1a;
    border: 1px solid #2d5a27;
    border-radius: 8px;
    padding: 0.8rem 1rem;
    font-size: 0.85rem;
    color: #7bc67a;
    margin-bottom: 1rem;
    display: none;
  }

  .alert.error { background: #3a1a1a; border-color: #5a2727; color: #c67a7a; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="logo">KRAV<span>MAGA</span></div>
  <div class="tagline">Sistema de Asistencia</div>

  <div class="login-box" id="box-alumno">
    <h2>Acceso Alumno</h2>
    <input type="email" id="email-input" placeholder="tu@email.com" />
    <button class="btn" onclick="loginAlumno()">Entrar</button>
    <p class="error-msg" id="error-alumno">Email no encontrado</p>
    <button class="btn btn-outline" style="margin-top:1rem" onclick="showProfesorLogin()">Soy el Profesor →</button>
  </div>

  <div class="login-box hidden" id="box-profesor">
    <h2>Acceso Profesor</h2>
    <input type="password" id="pass-input" placeholder="Contraseña" />
    <button class="btn" onclick="loginProfesor()">Entrar</button>
    <p class="error-msg" id="error-profesor">Contraseña incorrecta</p>
    <button class="btn btn-outline" style="margin-top:1rem" onclick="showAlumnoLogin()">← Soy Alumno</button>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header>
    <div class="logo">KRAV<span>MAGA</span></div>
    <div class="user-info">
      <span class="user-name" id="header-nombre"></span>
      <button class="logout-btn" onclick="logout()">Salir</button>
    </div>
  </header>

  <main>
    <!-- VISTA ALUMNO -->
    <div id="vista-alumno" class="hidden">
      <div class="alert" id="alert-alumno"></div>

      <div class="card" id="card-progreso">
        <div class="card-label">Progreso hacia siguiente grado</div>
        <div class="card-value rojo" id="alumno-grado">—</div>
        <div class="progress-wrap">
          <div class="progress-bar" id="progress-bar" style="width:0%"></div>
        </div>
        <div class="progress-label">
          <span id="prog-asistidas">0 clases</span>
          <span id="prog-restantes">faltan 0</span>
        </div>
      </div>

      <div class="stats-grid">
        <div class="stat-card">
          <div class="stat-num" id="stat-asistidas">—</div>
          <div class="stat-label">Asistidas</div>
        </div>
        <div class="stat-card">
          <div class="stat-num" id="stat-restantes">—</div>
          <div class="stat-label">Restantes</div>
        </div>
      </div>

      <div class="section-title">Próximas Clases</div>
      <div id="lista-clases-alumno"><div class="loading">Cargando...</div></div>
    </div>

    <!-- VISTA PROFESOR -->
    <div id="vista-profesor" class="hidden">
      <div class="tabs">
        <button class="tab active" onclick="tabProfesor('asistencia', this)">Asistencia</button>
        <button class="tab" onclick="tabProfesor('alumnos', this)">Alumnos</button>
      </div>

      <div id="tab-asistencia">
        <div class="section-title">Seleccionar Clase</div>
        <select id="select-clase" onchange="cargarInscritos()">
          <option value="">— Elige una clase —</option>
        </select>

        <div class="alert" id="alert-profesor"></div>
        <div id="lista-inscritos"></div>

        <div id="agregar-alumno-wrap" class="hidden">
          <div class="section-title" style="margin-top:1rem">Agregar sin inscripción</div>
          <select id="select-alumno-extra">
            <option value="">— Elige alumno —</option>
          </select>
          <button class="btn" onclick="agregarExtra()">Agregar y marcar presente</button>
        </div>
      </div>

      <div id="tab-alumnos" class="hidden">
        <div class="section-title">Todos los Alumnos</div>
        <div id="lista-todos-alumnos"><div class="loading">Cargando...</div></div>
      </div>
    </div>
  </main>
</div>

<!-- iframe oculto para POSTs sin CORS -->
<iframe id="post-frame" name="post-frame" style="display:none"></iframe>
<form id="post-form" method="POST" target="post-frame" style="display:none">
  <input type="hidden" id="form-data" name="data" />
</form>

<script>
// =====================================================
// CONFIGURACIÓN — SOLO CAMBIA ESTA URL
// =====================================================
const API = 'https://script.google.com/macros/s/AKfycbytFdV_xwcDd0ZFWYP9yFxykmFRM-9lfMYWK5LjcD122yViPvnU973Ordr5aGc3w8EH/exec';
const PASS_PROFESOR = '1234';
// =====================================================

let currentUser = null;
let clases = [];
let todosAlumnos = [];
let inscritosClase = [];
let cbCounter = 0;

// =================== JSONP ===================
// Usamos JSONP para todos los GETs y evitamos CORS

function jsonp(url) {
  return new Promise((resolve, reject) => {
    const cbName = '__cb' + (cbCounter++);
    window[cbName] = function(data) {
      resolve(data);
      delete window[cbName];
      document.getElementById(cbName) && document.getElementById(cbName).remove();
    };
    const script = document.createElement('script');
    script.id = cbName;
    script.src = url + (url.includes('?') ? '&' : '?') + 'callback=' + cbName;
    script.onerror = () => {
      reject(new Error('JSONP error'));
      delete window[cbName];
      script.remove();
    };
    document.head.appendChild(script);
    // Timeout de seguridad
    setTimeout(() => {
      if (window[cbName]) {
        reject(new Error('JSONP timeout'));
        delete window[cbName];
        script.remove();
      }
    }, 10000);
  });
}

// =================== POST via form (no-CORS workaround) ===================
// Google Apps Script acepta POSTs pero no devuelve respuesta utilizable
// desde páginas externas. Usamos un iframe oculto — el POST se envía,
// no leemos la respuesta pero el servidor la procesa igual.

function postData(payload) {
  const form = document.getElementById('post-form');
  document.getElementById('form-data').value = JSON.stringify(payload);
  form.action = API;
  form.submit();
  // Pequeño delay para que el iframe procese
  return new Promise(resolve => setTimeout(resolve, 800));
}

// =================== LOGIN ===================

function showProfesorLogin() {
  document.getElementById('box-alumno').classList.add('hidden');
  document.getElementById('box-profesor').classList.remove('hidden');
}

function showAlumnoLogin() {
  document.getElementById('box-profesor').classList.add('hidden');
  document.getElementById('box-alumno').classList.remove('hidden');
}

async function loginAlumno() {
  const email = document.getElementById('email-input').value.trim();
  if (!email) return;

  const btn = document.querySelector('#box-alumno .btn');
  btn.textContent = 'Buscando...';
  btn.disabled = true;
  document.getElementById('error-alumno').style.display = 'none';

  try {
    const data = await jsonp(`${API}?action=getAlumno&email=${encodeURIComponent(email)}`);

    if (data.error) {
      document.getElementById('error-alumno').style.display = 'block';
      btn.textContent = 'Entrar';
      btn.disabled = false;
      return;
    }

    currentUser = { ...data, email, rol: 'alumno' };
    mostrarApp();
  } catch(e) {
    document.getElementById('error-alumno').textContent = 'Error de conexión';
    document.getElementById('error-alumno').style.display = 'block';
    btn.textContent = 'Entrar';
    btn.disabled = false;
  }
}

function loginProfesor() {
  const pass = document.getElementById('pass-input').value;
  document.getElementById('error-profesor').style.display = 'none';
  if (pass === PASS_PROFESOR) {
    currentUser = { nombre: 'Profesor', rol: 'profesor' };
    mostrarApp();
  } else {
    document.getElementById('error-profesor').style.display = 'block';
  }
}

function logout() {
  currentUser = null;
  clases = [];
  todosAlumnos = [];
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('email-input').value = '';
  document.getElementById('pass-input').value = '';
  document.getElementById('lista-inscritos').innerHTML = '';
  document.getElementById('select-clase').innerHTML = '<option value="">— Elige una clase —</option>';
}

// =================== APP ===================

async function mostrarApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  document.getElementById('header-nombre').textContent = currentUser.nombre;

  try {
    clases = await fetchClases();
  } catch(e) {
    clases = [];
  }

  if (currentUser.rol === 'alumno') {
    document.getElementById('vista-alumno').classList.remove('hidden');
    document.getElementById('vista-profesor').classList.add('hidden');
    renderDashboardAlumno();
    renderClasesAlumno();
  } else {
    document.getElementById('vista-profesor').classList.remove('hidden');
    document.getElementById('vista-alumno').classList.add('hidden');
    renderSelectClases();
    cargarTodosAlumnos();
  }
}

// =================== ALUMNO ===================

function renderDashboardAlumno() {
  const u = currentUser;
  const requeridas = u.requeridas || 1;
  const pct = Math.min(100, Math.round((u.asistidas / requeridas) * 100));

  document.getElementById('alumno-grado').textContent = (u.grado || '—').toUpperCase();
  document.getElementById('progress-bar').style.width = pct + '%';
  document.getElementById('prog-asistidas').textContent = u.asistidas + ' clases';
  document.getElementById('prog-restantes').textContent = 'faltan ' + u.restantes;
  document.getElementById('stat-asistidas').textContent = u.asistidas;
  document.getElementById('stat-restantes').textContent = u.restantes;

  if (u.restantes <= 5) {
    showAlert('alert-alumno', '🔥 ¡Casi listo para el siguiente grado!', false);
  }
}

function renderClasesAlumno() {
  const container = document.getElementById('lista-clases-alumno');
  if (!clases.length) {
    container.innerHTML = '<div class="loading">Sin clases disponibles</div>';
    return;
  }

  container.innerHTML = clases.map(c => {
    let fechaStr = '—';
    try {
      fechaStr = new Date(c.fecha).toLocaleDateString('es-CL', {weekday:'short', day:'numeric', month:'short'});
    } catch(e) { fechaStr = c.fecha; }
    return `
      <div class="clase-item">
        <div class="clase-info">
          <h3>${c.tipo || 'Clase'}</h3>
          <p>${fechaStr}</p>
        </div>
        <button class="btn-small" id="btn-inscribir-${c.id}" onclick="inscribirse('${c.id}')">Inscribirse</button>
      </div>
    `;
  }).join('');
}

async function inscribirse(claseId) {
  const btn = document.getElementById('btn-inscribir-' + claseId);
  btn.textContent = '...';
  btn.disabled = true;

  try {
    await postData({ action: 'inscribir', alumnoId: currentUser.id, claseId });
    btn.textContent = '✓ Inscrito';
    btn.classList.add('inscrito');
  } catch(e) {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

// =================== PROFESOR ===================

function tabProfesor(tab, el) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  document.getElementById('tab-asistencia').classList.toggle('hidden', tab !== 'asistencia');
  document.getElementById('tab-alumnos').classList.toggle('hidden', tab !== 'alumnos');
}

function renderSelectClases() {
  const sel = document.getElementById('select-clase');
  sel.innerHTML = '<option value="">— Elige una clase —</option>';
  clases.forEach(c => {
    let fechaStr = '—';
    try { fechaStr = new Date(c.fecha).toLocaleDateString('es-CL', {day:'numeric', month:'short'}); } catch(e) { fechaStr = c.fecha; }
    sel.innerHTML += `<option value="${c.id}">${c.tipo || 'Clase'} — ${fechaStr}</option>`;
  });
}

async function cargarInscritos() {
  const claseId = document.getElementById('select-clase').value;
  const container = document.getElementById('lista-inscritos');
  const wrap = document.getElementById('agregar-alumno-wrap');

  if (!claseId) { container.innerHTML = ''; wrap.classList.add('hidden'); return; }

  container.innerHTML = '<div class="loading">Cargando inscritos...</div>';

  try {
    inscritosClase = await jsonp(`${API}?action=getInscritos&claseId=${claseId}`);

    if (!inscritosClase.length) {
      container.innerHTML = '<div class="loading">Sin inscritos aún</div>';
    } else {
      container.innerHTML = `
        <div class="card" style="padding:0.5rem">
          ${inscritosClase.map(a => `
            <div class="alumno-row">
              <span class="alumno-nombre">${a.nombre}</span>
              <button class="check-btn" id="check-${a.id}" onclick="toggleAsistencia('${a.id}', '${claseId}', this)">○</button>
            </div>
          `).join('')}
        </div>
      `;
    }

    // Extras: alumnos no inscritos
    const selExtra = document.getElementById('select-alumno-extra');
    selExtra.innerHTML = '<option value="">— Elige alumno —</option>';
    todosAlumnos.forEach(a => {
      if (!inscritosClase.find(i => i.id == a.id)) {
        selExtra.innerHTML += `<option value="${a.id}">${a.nombre}</option>`;
      }
    });

    wrap.classList.remove('hidden');
  } catch(e) {
    container.innerHTML = '<div class="loading">Error al cargar inscritos</div>';
    showAlert('alert-profesor', 'No se pudieron cargar los inscritos', true);
  }
}

async function toggleAsistencia(alumnoId, claseId, btn) {
  const yaPresente = btn.classList.contains('presente');
  btn.classList.toggle('presente', !yaPresente);
  btn.classList.toggle('ausente', yaPresente);
  btn.textContent = !yaPresente ? '✓' : '✗';

  try {
    await postData({
      action: 'marcarAsistencia',
      alumnoId,
      claseId,
      asistio: !yaPresente ? 'Y' : 'N'
    });
  } catch(e) {
    showAlert('alert-profesor', 'Error al guardar asistencia', true);
  }
}

async function agregarExtra() {
  const alumnoId = document.getElementById('select-alumno-extra').value;
  const claseId = document.getElementById('select-clase').value;
  if (!alumnoId || !claseId) return;

  try {
    await postData({ action: 'inscribir', alumnoId, claseId });
    await postData({ action: 'marcarAsistencia', alumnoId, claseId, asistio: 'Y' });
    showAlert('alert-profesor', 'Alumno agregado y marcado presente ✓', false);
    setTimeout(() => cargarInscritos(), 1200); // Esperar que los POSTs procesen
  } catch(e) {
    showAlert('alert-profesor', 'Error al agregar alumno', true);
  }
}

async function cargarTodosAlumnos() {
  const container = document.getElementById('lista-todos-alumnos');
  try {
    todosAlumnos = await jsonp(`${API}?action=getAlumnos`);
    if (!todosAlumnos.length) {
      container.innerHTML = '<div class="loading">Sin alumnos</div>';
      return;
    }
    container.innerHTML = `
      <div class="card" style="padding:0.5rem">
        ${todosAlumnos.map(a => `
          <div class="alumno-row">
            <div>
              <div class="alumno-nombre">${a.nombre}</div>
              <div style="font-size:0.75rem;color:var(--texto-suave)">${a.grado || '—'} · ${a.asistidas || 0} clases</div>
            </div>
          </div>
        `).join('')}
      </div>
    `;
  } catch(e) {
    container.innerHTML = '<div class="loading">Error al cargar alumnos</div>';
  }
}

// =================== UTILS ===================

async function fetchClases() {
  return await jsonp(`${API}?action=getClases`);
}

function showAlert(id, msg, isError) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert' + (isError ? ' error' : '');
  el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 4000);
}
</script>
